spring.application.name=Prode

# ==========================================
# SERVIDOR
# ==========================================
server.port=8080

# ==========================================
# BASE DE DATOS (H2 en memoria para desarrollo)
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (útil para ver los datos en dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ==========================================
# JWT
# ==========================================
# Secret en Base64 de al menos 256 bits (32 caracteres antes de encodear)
# Para generar uno nuevo en terminal:
#   echo -n "tu-clave-secreta-de-32-caracteres!!" | base64
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IganduIGluIHNwcmluZyBib290
jwt.expiration=86400000
